<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="#08081a"/>

  <!-- Outer glow ring -->
  <circle cx="128" cy="128" r="80" stroke="url(#ring-grad)" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Star shape -->
  <path d="M128 60 L136 110 L186 110 L147 140 L161 190 L128 162 L95 190 L109 140 L70 110 L120 110 Z"
        fill="url(#star-grad)" opacity="0.9"/>

  <!-- Center sparkle -->
  <circle cx="128" cy="128" r="10" fill="white" opacity="0.95"/>
  <circle cx="128" cy="128" r="5" fill="url(#glow-grad)"/>

  <!-- Accent stars -->
  <circle cx="68" cy="72" r="2.5" fill="#9b78f8" opacity="0.8"/>
  <circle cx="190" cy="85" r="2" fill="#c4b5fd" opacity="0.7"/>
  <circle cx="80" cy="190" r="2" fill="#9b78f8" opacity="0.6"/>
  <circle cx="200" cy="175" r="1.5" fill="#c4b5fd" opacity="0.6"/>
  <circle cx="45" cy="140" r="1.5" fill="#ddd6fe" opacity="0.5"/>
  <circle cx="215" cy="130" r="1.5" fill="#ddd6fe" opacity="0.5"/>

  <defs>
    <radialGradient id="star-grad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#5028c8"/>
    </radialGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9b78f8"/>
    </radialGradient>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c4ff0"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
  </defs>
</svg>
